<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <style>
    </style>
</head>

<body>
    <div class="container">
        <form id="myForm" enctype="multipart/form-data">
            <!-- <form id="myForm"  method="post" action="form.php" enctype="multipart/form-data" > -->

            <!-- Hidden input for Edit Mode -->
            <input type="hidden" name="id" id="userId">
            <input type="hidden" name="action" id="formAction" value="insert">

            <h2>PROFILE</h2>
            <div class="user-img ">
                <img src="images/man.png" alt="user-imgage" class="user-img" id="profile-pic">
                <input type="file" name="image" id="fileInput" class="img-input" accept="images/*"
                    onchange="loadImage(event)">
                <img src="images/pencil-2.jpg" alt="update-user-image" class="user-update" onclick="selectimage()">
            </div>
            <div>
            </div>

            <div class="form-item">
                <label for="firstname">First name:</label>
                <input type="text" class="input" name="firstname" placeholder="First name" required>
            </div>

            <div class="form-item">
                <label for="lastname">Last name:</label>
                <input type="text" class="input" name="lastname" placeholder="Last name" required>
            </div>

            <div class="form-item">
                <label for="email">Email:</label>
                <input type="email" class="input" name="email" placeholder="Email" required>
            </div>

            <div class="form-item">
                <label for="password">Password:</label>
                <input type="password" id="password" class="input" name="password" placeholder="Password" required>
            </div>

            <div class="form-item">
                <label for="mobile">Mobile:</label>
                <input type="tel" id="mobile" class="input" name="mobile" placeholder="Mobile" required>
            </div>

            <div class=" gender">
                <label for="Gender">Gender</label>
                <input type="radio" class="gvalue" name="gender" value="Male" required>Male
                <input type="radio" class="gvalue" name="gender" value="Other">Other
                <input type="radio" class="gvalue" name="gender" value="Female">Female
            </div>

            <div class="form-item btn-group">
                <button type="submit" class="btn" name="submit" value="submit" id="submitBtn">SIGN IN</button>
                <button type="button" class="btn btn-cancel" id="cancelBtn" onclick="resetForm()"
                    style="display: none;">CANCEL</button>
            </div>

            <div class="forget">
                <div>
                    <span class="forget">Forgot <a href="#">Username / Password?</a></span>
                </div>
                <div>
                    <span class="forget">Don't have an account? <a href="#">Sign up</a></span>
                </div>
                <p id="password_error"></p> <br>
                <p id="mobile_error"></p>
                <p id="msg"></p>
            </div>
        </form>

        <!-- Table to display users -->
        <!-- Table removed, now on display.html -->
        <!-- View All Link Removed -->
    </div>

    <script src="script.js"></script>

</body>

</html>
